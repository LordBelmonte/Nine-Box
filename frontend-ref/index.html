<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Gestão de Pessoas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
  <h2>Portal de Gestão de Pessoas</h2>
  <button id="dark-mode-btn" onclick="toggleDarkMode()" title="Modo escuro">
    <i class="fa-solid fa-moon"></i>
  </button>
  <div class="user-menu" id="user-menu">
    <div class="user" id="user-btn" onclick="toggleUserMenu()" title="Minha conta">
      <i class="fa-solid fa-user" aria-hidden="true"></i>
    </div>
    <div class="user-dropdown" id="user-dropdown">
      <div class="user-dropdown-info" id="user-dropdown-info">
        <div class="user-dropdown-avatar" id="user-dropdown-avatar">
          <i class="fa-solid fa-user"></i>
        </div>
        <div>
          <div class="user-dropdown-nome" id="user-dropdown-nome">Carregando...</div>
          <div class="user-dropdown-tipo" id="user-dropdown-tipo"></div>
        </div>
      </div>
      <div class="user-dropdown-divider"></div>
      <button class="user-dropdown-item user-dropdown-sair" id="btn-sair-header" onclick="sairDaConta()" style="display:none">
        <i class="fa-solid fa-right-from-bracket"></i> Sair da conta
      </button>
    </div>
  </div>
</header>

<nav class="navbar">
  <ul class="navbar-nav">
    <li class="navbar-item">
      <a href="index.html" class="navbar-link">
        <i class="fa-solid fa-home"></i>
        <span>Início</span>
      </a>
    </li>
    <li class="navbar-item" data-role="admin">
      <a href="pages/cadastrar.html" class="navbar-link">
        <i class="fa-solid fa-user-plus"></i>
        <span>Cadastrar</span>
      </a>
    </li>
    <li class="navbar-item" data-role="admin">
      <a href="pages/consultar.html" class="navbar-link">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Consultar</span>
      </a>
    </li>
    <li class="navbar-item" data-role="colaborador">
      <a href="pages/avaliacoes-pendentes.html" class="navbar-link">
        <i class="fa-solid fa-star"></i>
        <span>Avaliações Pendentes</span>
      </a>
    </li>
    <li class="navbar-item navbar-item-dropdown" data-role="admin">
      <a href="#" class="navbar-link navbar-link-dropdown" onclick="toggleSubmenu(event, this)">
        <i class="fa-solid fa-star"></i>
        <span>Avaliações</span>
        <i class="fa-solid fa-chevron-down navbar-chevron"></i>
      </a>
      <ul class="navbar-submenu">
        <li data-role="admin"><a href="pages/campanhas.html" class="navbar-submenu-link"><i class="fa-solid fa-bullhorn"></i> Campanhas</a></li>
        <li><a href="pages/avaliacoes.html" class="navbar-submenu-link"><i class="fa-solid fa-star"></i> Avaliações</a></li>
        <li data-role="admin"><a href="pages/historico-avaliacoes.html" class="navbar-submenu-link"><i class="fa-solid fa-history"></i> Histórico</a></li>
        <li data-role="admin"><a href="pages/nine-box.html" class="navbar-submenu-link"><i class="fa-solid fa-th"></i> Nine Box</a></li>
        <li><a href="pages/competencias.html" class="navbar-submenu-link"><i class="fa-solid fa-clipboard-check"></i> Competências</a></li>
      </ul>
    </li>
    <li class="navbar-item" data-role="admin">
      <a href="pages/grupos.html" class="navbar-link">
        <i class="fa-solid fa-users"></i>
        <span>Grupos</span>
      </a>
    </li>
    <li class="navbar-item" data-role="admin">
      <a href="pages/relatorios.html" class="navbar-link">
        <i class="fa-solid fa-chart-bar"></i>
        <span>Relatórios</span>
      </a>
    </li>
  </ul>
</nav>

<style>
  .dash-welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 48px 32px;
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    text-align: center;
    max-width: 420px;
    width: 100%;
  }
  .dash-welcome i { font-size: 52px; color: var(--primary-light); }
  .dash-welcome h3 { font-size: 20px; font-weight: 700; color: var(--primary); margin: 0; }
  .dash-welcome p { font-size: 14px; color: var(--text-muted); margin: 0; line-height: 1.5; }
  .dash-welcome-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 24px; background: var(--primary); color: white;
    border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
    text-decoration: none; transition: all 0.2s; margin-top: 4px;
  }
  .dash-welcome-btn:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(30,58,138,0.25); }
  body.dark-mode .dash-welcome { background: #1e293b; border-color: #334155; }

  /* Dashboard stats */
  .dash-stats {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .dash-stats-small {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .dash-stats-large {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .dash-stat {
    background: var(--surface);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .dash-stat-large {
    background: var(--surface);
    border-radius: 12px;
    padding: 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .dash-stat i,
  .dash-stat-large i {
    font-size: 28px;
    color: var(--primary);
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(99, 102, 241, 0.1);
    border-radius: 10px;
  }

  .dash-stat-large i {
    font-size: 32px;
    width: 56px;
    height: 56px;
  }

  .dash-stat-val,
  .dash-stat-large .dash-stat-val {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    display: block;
  }

  .dash-stat-large .dash-stat-val {
    font-size: 36px;
  }

  .dash-stat-label,
  .dash-stat-large .dash-stat-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .dash-stat-large .dash-stat-label {
    font-size: 14px;
  }
</style>

<main class="wrapper wrapper-center">
  <div class="dashboard">

    <!-- Dashboard stats -->
    <div class="dash-stats" id="dash-stats"></div>

  </div>
</main>

<script type="module">
  import { requireAuth, getUser, isGestor, isColaborador } from './js/auth.js';
  import './js/navbar.js';

  requireAuth();

  const user = getUser();

  // Redirecionar gestor/colaborador para avaliações
  if (isGestor() || isColaborador()) {
    window.location.href = 'pages/avaliacoes.html';
  }

  // Apenas admin continua na página
  const statsBox = document.getElementById('dash-stats');

  function mostrarWelcome() {
    statsBox.innerHTML = `
      <div class="dash-welcome">
        <i class="fa-solid fa-users"></i>
        <h3>Bem-vindo ao Portal de Gestão de Pessoas!</h3>
        <p>Comece cadastrando gestores e colaboradores para usar o sistema.</p>
        <a href="pages/cadastrar.html" class="dash-welcome-btn">
          <i class="fa-solid fa-user-plus"></i> Cadastrar primeira pessoa
        </a>
      </div>`;
  }

  function mostrarStats(d) {
    statsBox.innerHTML = `
      <div class="dash-stats-small">
        <div class="dash-stat">
          <i class="fa-solid fa-user-tie"></i>
          <div>
            <span class="dash-stat-val">${d.usuarios?.porTipo?.gestor ?? '—'}</span>
            <span class="dash-stat-label">Gestores</span>
          </div>
        </div>
        <div class="dash-stat">
          <i class="fa-solid fa-users"></i>
          <div>
            <span class="dash-stat-val">${d.usuarios?.porTipo?.colaborador ?? '—'}</span>
            <span class="dash-stat-label">Colaboradores</span>
          </div>
        </div>
        <div class="dash-stat">
          <i class="fa-solid fa-star"></i>
          <div>
            <span class="dash-stat-val">${d.avaliacoes?.total ?? '—'}</span>
            <span class="dash-stat-label">Avaliações</span>
          </div>
        </div>
        <div class="dash-stat">
          <i class="fa-solid fa-th"></i>
          <div>
            <span class="dash-stat-val">${d.nineBox?.total ?? '—'}</span>
            <span class="dash-stat-label">Nine Box</span>
          </div>
        </div>
      </div>
      <div class="dash-stats-large">
        <div class="dash-stat-large">
          <i class="fa-solid fa-bullhorn"></i>
          <div>
            <span class="dash-stat-val">${d.totalCampanhas ?? '—'}</span>
            <span class="dash-stat-label">Campanhas</span>
          </div>
        </div>
        <div class="dash-stat-large">
          <i class="fa-solid fa-clipboard-check"></i>
          <div>
            <span class="dash-stat-val">${d.totalCompetencias ?? '—'}</span>
            <span class="dash-stat-label">Competências</span>
          </div>
        </div>
        <div class="dash-stat-large">
          <i class="fa-solid fa-users-gear"></i>
          <div>
            <span class="dash-stat-val">${d.totalGrupos ?? '—'}</span>
            <span class="dash-stat-label">Grupos</span>
          </div>
        </div>
        <div class="dash-stat-large">
          <i class="fa-solid fa-chart-bar"></i>
          <div>
            <span class="dash-stat-val">${d.totalRelatorios ?? '—'}</span>
            <span class="dash-stat-label">Relatórios</span>
          </div>
        </div>
        <div class="dash-stat-large">
          <i class="fa-solid fa-user-check"></i>
          <div>
            <span class="dash-stat-val">${d.usuariosAtivos ?? '—'}</span>
            <span class="dash-stat-label">Usuários Ativos</span>
          </div>
        </div>
        <div class="dash-stat-large">
          <i class="fa-solid fa-clock"></i>
          <div>
            <span class="dash-stat-val">${d.avaliacoesPendentes ?? '—'}</span>
            <span class="dash-stat-label">Avaliações Pendentes</span>
          </div>
        </div>
      </div>`;
  }

  // Carregar dashboard para admin
  try {
    const { reportsApi } = await import('./js/api.js');
    
    // Função para carregar dados do dashboard
    async function carregarDashboard() {
      const res = await reportsApi.dashboard();
      const d = res.data;
      const totalUsuarios = d.totalUsuarios ?? 0;

      // Mostrar stats se houver dados suficientes
      if (totalUsuarios > 0 || d.totalGestores > 0 || d.totalColaboradores > 0 || d.avaliacoes?.total > 0) {
        const statsData = {
          usuarios: {
            total: d.totalUsuarios || 0,
            porTipo: {
              gestor: d.totalGestores || 0,
              colaborador: d.totalColaboradores || 0
            }
          },
          avaliacoes: {
            total: d.avaliacoes?.total || 0
          },
          nineBox: {
            total: d.totalNineBox ?? 0
          },
          totalCampanhas: d.totalCampanhas || 0,
          totalCompetencias: d.totalCompetencias || 0,
          totalGrupos: d.totalGrupos || 0,
          totalRelatorios: d.totalRelatorios || 0,
          usuariosAtivos: d.usuariosAtivos || 0,
          avaliacoesPendentes: d.avaliacoesPendentes || 0
        };
        mostrarStats(statsData);
      } else {
        mostrarWelcome();
      }
    }

    // Carregar dashboard inicialmente
    await carregarDashboard();

    // Atualizar dashboard automaticamente a cada 30 segundos
    setInterval(carregarDashboard, 30000);
  } catch (error) {
    console.error('Erro ao carregar dashboard:', error);
    mostrarWelcome();
  }
</script>
</body>
</html>
