<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orientações</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>(function(){const dm=localStorage.getItem('darkMode');if(dm==='1'||(dm===null&&window.matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.classList.add('dark-mode');if(document.body)document.body.classList.add('dark-mode');}})();</script>
  <style>
    .orientacoes-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .orientacoes-box {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      margin-bottom: 30px;
      box-shadow: var(--shadow-md);
    }

    .orientacoes-texto {
      color: var(--text);
      font-size: 16px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .btn-container {
      display: flex;
      justify-content: center;
      margin-top: 30px;
    }

    .btn-comecar {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 36px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-comecar:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

<header>
  <h2 id="page-title">Orientações</h2>
  <button id="dark-mode-btn" onclick="toggleDarkMode()"><i class="fa-solid fa-moon"></i></button>
  <div class="user-menu" id="user-menu">
    <div class="user" id="user-btn" onclick="toggleUserMenu()"><i class="fa-solid fa-user"></i></div>
    <div class="user-dropdown" id="user-dropdown">
      <div class="user-dropdown-info">
        <div class="user-dropdown-avatar" id="user-dropdown-avatar"><i class="fa-solid fa-user"></i></div>
        <div>
          <div class="user-dropdown-nome" id="user-dropdown-nome">Carregando...</div>
          <div class="user-dropdown-tipo" id="user-dropdown-tipo"></div>
        </div>
      </div>
      <div class="user-dropdown-divider"></div>
      <a href="../perfil.html" class="user-dropdown-item"><i class="fa-solid fa-user-pen"></i> Meu Perfil</a>
      <button class="user-dropdown-item user-dropdown-sair" id="btn-sair-header" onclick="sairDaConta()" style="display:none">
        <i class="fa-solid fa-right-from-bracket"></i> Sair
      </button>
    </div>
  </div>
</header>

<nav class="navbar">
  <ul class="navbar-nav">
    <li class="navbar-item"><a href="../index.html" class="navbar-link"><i class="fa-solid fa-home"></i><span>Inicio</span></a></li>
    <li class="navbar-item" data-role="admin"><a href="cadastrar.html" class="navbar-link"><i class="fa-solid fa-user-plus"></i><span>Cadastrar</span></a></li>
    <li class="navbar-item" data-role="gestorOrAdmin"><a href="consultar.html" class="navbar-link"><i class="fa-solid fa-magnifying-glass"></i><span>Consultar</span></a></li>
    <li class="navbar-item navbar-item-dropdown">
      <a href="#" class="navbar-link navbar-link-dropdown" onclick="toggleSubmenu(event, this)">
        <i class="fa-solid fa-star"></i><span>Avaliacoes</span><i class="fa-solid fa-chevron-down navbar-chevron"></i>
      </a>
      <ul class="navbar-submenu">
        <li data-role="admin"><a href="campanhas.html" class="navbar-submenu-link"><i class="fa-solid fa-bullhorn"></i> Campanhas</a></li>
        <li><a href="avaliacoes.html" class="navbar-submenu-link active"><i class="fa-solid fa-star"></i> Avaliacoes</a></li>
        <li data-role="gestorOrAdmin"><a href="nine-box.html" class="navbar-submenu-link"><i class="fa-solid fa-th"></i> Nine Box</a></li>
        <li><a href="competencias.html" class="navbar-submenu-link"><i class="fa-solid fa-clipboard-check"></i> Competencias</a></li>
      </ul>
    </li>
    <li class="navbar-item" data-role="gestorOrAdmin"><a href="grupos.html" class="navbar-link"><i class="fa-solid fa-users"></i><span>Grupos</span></a></li>
    <li class="navbar-item"><a href="relatorios.html" class="navbar-link"><i class="fa-solid fa-chart-bar"></i><span>Relatorios</span></a></li>
    <li class="navbar-item"><a href="../perfil.html" class="navbar-link"><i class="fa-solid fa-user"></i><span>Perfil</span></a></li>
  </ul>
</nav>

<main class="wrapper">
  <div class="orientacoes-container">
    <div class="orientacoes-box">
      <div class="orientacoes-texto" id="orientacoes-texto">
        Carregando orientações...
      </div>
    </div>

    <div class="btn-container">
      <button class="btn-comecar" id="responderCompetencias">
        Começar
      </button>
    </div>
  </div>
</main>

<script type="module">
  import { requireAuth, getUser, isGestor, isColaborador } from '../js/auth.js';
  import { campaignsApi } from '../js/api.js';
  import '../js/navbar.js';

  requireAuth();

  const user = getUser();
  const campaignId = localStorage.getItem('campaignId');

  // Se for colaborador, esconder header e navbar
  if (isColaborador()) {
    document.body.classList.add('colaborador-mode');
    const header = document.querySelector('header');
    const navbar = document.querySelector('.navbar');
    if (header) header.style.display = 'none';
    if (navbar) navbar.style.display = 'none';
  }

  async function loadOrientacoes() {
    const container = document.getElementById('orientacoes-texto');
    console.log('Carregando orientações para campaignId:', campaignId);
    try {
      const response = await campaignsApi.getById(campaignId);
      console.log('Resposta da API:', response);
      const campaign = response.data;
      console.log('Campanha:', campaign);
      
      if (campaign.descricao) {
        container.textContent = campaign.descricao;
      } else {
        container.textContent = 'Esta avaliação deve ser realizada com calma e atenção. Após iniciada, você terá que responder a todas as perguntas. Deseja começar?';
      }
    } catch (error) {
      console.error('Erro ao carregar orientações:', error);
      container.textContent = 'Esta avaliação deve ser realizada com calma e atenção. Após iniciada, você terá que responder a todas as perguntas. Deseja começar?';
    }
  }

  // Confirmação de início
  document.getElementById('responderCompetencias').addEventListener('click', function () {
    window.location.href = "responder-avaliacao.html";
  });

  if (campaignId) {
    loadOrientacoes();
  } else {
    window.location.href = 'avaliacoes.html';
  }
</script>
</body>
</html>
