<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agradecimentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>(function(){const dm=localStorage.getItem('darkMode');if(dm==='1'||(dm===null&&window.matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.classList.add('dark-mode');if(document.body)document.body.classList.add('dark-mode');}})();</script>
  <style>
    .agradecimentos-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 60px 20px;
      text-align: center;
    }

    .agradecimentos-box {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 60px 40px;
      box-shadow: var(--shadow-md);
    }

    .agradecimentos-icon {
      font-size: 64px;
      color: var(--primary);
      margin-bottom: 30px;
    }

    .agradecimentos-titulo {
      color: var(--primary);
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .agradecimentos-texto {
      color: var(--text);
      font-size: 18px;
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .btn-finalizar {
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px 48px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-finalizar:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

<header>
  <h2 id="page-title">Agradecimentos</h2>
  <button id="dark-mode-btn" onclick="toggleDarkMode()"><i class="fa-solid fa-moon"></i></button>
  <div class="user-menu" id="user-menu">
    <div class="user" id="user-btn" onclick="toggleUserMenu()"><i class="fa-solid fa-user"></i></div>
    <div class="user-dropdown" id="user-dropdown">
      <div class="user-dropdown-info">
        <div class="user-dropdown-avatar" id="user-dropdown-avatar"><i class="fa-solid fa-user"></i></div>
        <div>
          <div class="user-dropdown-nome" id="user-dropdown-nome">Carregando...</div>
          <div class="user-dropdown-tipo" id="user-dropdown-tipo"></div>
        </div>
      </div>
      <div class="user-dropdown-divider"></div>
      <a href="../perfil.html" class="user-dropdown-item"><i class="fa-solid fa-user-pen"></i> Meu Perfil</a>
      <button class="user-dropdown-item user-dropdown-sair" id="btn-sair-header" onclick="sairDaConta()" style="display:none">
        <i class="fa-solid fa-right-from-bracket"></i> Sair
      </button>
    </div>
  </div>
</header>



<main class="wrapper">
  <div class="agradecimentos-container">
    <div class="agradecimentos-box">
      <i class="fa-solid fa-check-circle agradecimentos-icon"></i>
      <h3 class="agradecimentos-titulo">Avaliação Concluída!</h3>
      <p class="agradecimentos-texto">
        Agradecemos sinceramente pela sua participação. Em breve, entraremos em contato com mais informações.
      </p>
      <button class="btn-finalizar" id="btn-finalizar">Finalizar</button>
    </div>
  </div>
</main>

<script type="module">
  import { requireAuth, logout, isColaborador } from '../js/auth.js';
  import '../js/navbar.js';

  requireAuth();

  function finalizar() {
    localStorage.removeItem('campaignId');
    localStorage.removeItem('respostas_avaliacao');
    
    // Se for colaborador, fazer logout e redirecionar para login
    if (isColaborador()) {
      logout();
      window.location.href = '../index.html';
    } else {
      window.location.href = '../index.html';
    }
  }

  document.getElementById('btn-finalizar').addEventListener('click', finalizar);
</script>
</body>
</html>
