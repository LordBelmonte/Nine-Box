    <script>
        //Identificação da página para o navbar
        window.nomePagina = "Menu";


        //Verifica o token de login para autorizar o usuário a usar a página.
        addEventListener("DOMContentLoaded", async (event) => {
            const tokenValue = sessionStorage.getItem("token");
            
            const valido = await verificaToken(tokenValue);

            if (!valido){
                return;
            }

            console.log("passou direto, reveja as funções");
            localStorage.clear();
            sessionStorage.clear();
            sessionStorage.setItem("token", tokenValue);
        });

        async function verificaToken(token) {

            if (!token) {
                alert('Sessão expirada ou não autenticada. Faça login novamente.');
                window.location.href = 'index.html';
                return;
            }

            try {
                const resposta = await fetch('http://localhost:3001/verificaToken', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!resposta.ok) {
                    alert('token inválido, efetue o login novamente');
                    window.location.href = 'index.html';
                    return;
                }

                const dados = await resposta.json();

            } catch (erro) {
                console.error("Erro ao authenticar o token, tente novamente: ", erro);
                window.location.href = 'index.html';
                return;
            }
        }

    </script>
